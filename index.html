<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/style.css">
    <title>Social Links Profile - FrontEnd Mentor</title>
</head>
<body>
    <main>
        <section class="container">
            <div class="img">
                <img src="images/avatar-jessica.jpeg" alt="Foto de perfil da Jessica" class="foto-perfil">
            </div>

            <div class="perfil">
                <h1 class="perfil-nome">Jessica Randall</h1>
                <p class="perfil-cidade">London, United Kingdom</p>
                <p class="perfil-cargo">"Front-end developer and avid reader"</p>
            </div>

            <div class="social-links">
                <a href="#" class="link">Github</a>
                <a href="#" class="link">Frontend Mentor</a>
                <a href="#" class="link">Linkedin</a>
                <a href="#" class="link">Twitter</a>
                <a href="#" class="link">Instagram</a>
            </div>
        </section>
    </main>
</body>
</html>
